name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Lint & Test (Linux is faster for general checks)
  test-linux:
    name: Lint & Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      
      - name: Format Check
        run: cargo fmt --all -- --check
      
      - name: Clippy
        run: cargo clippy --workspace --all-targets
        
      - name: Run Workspace Tests
        run: cargo test --workspace --exclude ochi-core # exclude if core has windows-only hardware tests
        
      - name: Run Core Tests (Skip Hardware)
        run: cargo test -p ochi-core --lib

  # Job 2: Platform Specific Tests (Windows)
  test-windows:
    name: Hardware Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        
      - name: Install LLVM
        run: choco install llvm -y --no-progress
      
      - name: Run Hardware Tests
        # We only run the specific hardware detection tests on Windows
        run: cargo test -p ochi-core hardware::detector -- --nocapture

  # Job 3: Build Release (Windows)
  build-release:
    name: Build Release (Windows)
    runs-on: windows-latest
    needs: [test-linux, test-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      
      - name: Install LLVM
        run: choco install llvm -y --no-progress
      
      - name: Build Release
        run: cargo build --release
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ochi-release-windows
          path: |
            target/release/ochi_core.exe
            target/release/*.dll
          if-no-files-found: warn

  # Summary Job
  ci-summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-linux, test-windows]
    if: always()
    steps:
      - name: Status
        run: |
          echo "Linux Tests: ${{ needs.test-linux.result }}"
          echo "Windows Tests: ${{ needs.test-windows.result }}"
          if [[ "${{ needs.test-linux.result }}" == "success" && "${{ needs.test-windows.result }}" == "success" ]]; then
            echo "CI Passed"
            exit 0
          else
            echo "CI Failed"
            exit 1
          fi
